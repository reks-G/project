{% extends "base.html" %}

{% block title %}Создать задачу - TaskControl{% endblock %}

{% block content %}
<div class="form-container">
    <a href="{{ url_for('index', telegram_id=request.args.get('telegram_id', 123456)) }}" class="back-link">
        <svg class="icon icon--sm">
            <use href="#icon-arrow-left"></use>
        </svg>
        Назад к задачам
    </a>
    
    <h2>Создать новую задачу</h2>
    
    {% if errors %}
    <div class="error-banner" role="alert">
        <ul class="error-list">
            {% for error in errors %}
            <li class="error-item">{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    
    <form method="POST">
        <div class="form-field">
            <label for="title" class="form-field__label">Название задачи *</label>
            <input 
                type="text" 
                id="title"
                name="title" 
                class="form-field__input"
                placeholder="Введите название задачи" 
                maxlength="500"
                required
                aria-required="true">
        </div>
        
        <div class="form-field">
            <label for="description" class="form-field__label">Описание</label>
            <textarea 
                id="description"
                name="description" 
                class="form-field__input"
                placeholder="Добавьте описание задачи..."
                aria-label="Описание задачи"></textarea>
        </div>
        
        <div class="form-field">
            <label class="form-field__label">Приоритет</label>
            <div class="priority-buttons">
                <input type="radio" name="priority" value="low" id="priority-low" class="priority-btn__input">
                <label for="priority-low" class="priority-btn priority-btn--low">
                    <svg class="icon icon--sm">
                        <use href="#icon-priority-low"></use>
                    </svg>
                    Низкий
                </label>
                
                <input type="radio" name="priority" value="medium" id="priority-medium" class="priority-btn__input" checked>
                <label for="priority-medium" class="priority-btn priority-btn--medium">
                    <svg class="icon icon--sm">
                        <use href="#icon-priority-medium"></use>
                    </svg>
                    Средний
                </label>
                
                <input type="radio" name="priority" value="high" id="priority-high" class="priority-btn__input">
                <label for="priority-high" class="priority-btn priority-btn--high">
                    <svg class="icon icon--sm">
                        <use href="#icon-priority-high"></use>
                    </svg>
                    Высокий
                </label>
            </div>
        </div>
        
        <div class="form-field">
            <label for="due_at" class="form-field__label">Срок выполнения</label>
            <input 
                type="datetime-local" 
                id="due_at"
                name="due_at"
                class="form-field__input"
                aria-label="Срок выполнения задачи">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <svg class="icon">
                    <use href="#icon-plus"></use>
                </svg>
                Создать задачу
            </button>
            <a href="{{ url_for('index', telegram_id=request.args.get('telegram_id', 123456)) }}" class="btn-secondary">
                <svg class="icon">
                    <use href="#icon-x"></use>
                </svg>
                Отмена
            </a>
        </div>
    </form>
</div>
{% endblock %}
